<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mega Dropdown Menu</title>
  <link rel="stylesheet" href="styles/sample.css">
  <script src="scripts/sample.js" defer></script>
</head>
<body>

  <div id="script">

    <!-- Main Menu -->
    <div class="menu-page active" id="main-menu">

        <div class="navigationX">
            <span>MENU</span>
            <button id="closeMenu">✕</button>
        </div>

        <ul>

            <li><a href="#">Home</a></li>

            <li class="has-submenu" data-target="shop-menu">
                Shop
                <span>→</span>
            </li>

            <li><a href="#">Collections</a></li>

            <li class="has-submenu" data-target="device-menu">
                Smart Devices
                <span>→</span>
            </li>

            <li><a href="#">Blog</a></li>

            <li><a href="#">Contact</a></li>

        </ul>

    </div>

    <!-- Shop -->
    <div class="menu-page" id="shop-menu">

        <div class="navigationX">

            <button class="back" data-back="main-menu">
                ←
            </button>

            <span>Shop</span>

        </div>

        <ul>

            <li class="has-submenu" data-target="camera-menu">
                Cameras
                <span>→</span>
            </li>

            <li>
                Phones
                <span>→</span>
            </li>

            <li>
                TV & Speaker
                <span>→</span>
            </li>

        </ul>

    </div>

    <!-- Cameras -->
    <div class="menu-page" id="camera-menu">

        <div class="navigationX">

            <button class="back" data-back="shop-menu">
                ←
            </button>

            <span>Cameras</span>

        </div>

        <ul>

            <li>Backup Camera</li>

            <li>Digital Camera</li>

            <li>IP Camera</li>

            <li>Movie Camera</li>

        </ul>

    </div>

</div>
</body>
</html>
